<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">📊 Live Attendance & Engagement Metrics</h2>
        
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Student ID</th>
                            <th>Engagement Score</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>{{ student[0] }}</td>
                            <td>{{ student[1] }}</td>
                            <td>
                                <span class="badge {% if student[2] > 80 %}bg-success{% else %}bg-warning{% endif %}">
                                    {{ student[2] }}%
                                </span>
                            </td>
                            <td>{{ student[3] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a href="/" class="btn btn-secondary">Go to Scanner</a>
        </div>
    </div>
</body>
</html>
